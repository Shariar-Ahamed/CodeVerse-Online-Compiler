<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeVerse - Account Authentication</title>

    <!-- FontAwesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Styling override sheet -->
    <link rel="stylesheet" href="css/style.css?v=14" />
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-4 py-8 sm:py-12 transition-colors duration-300 bg-[var(--bg-primary)] text-[var(--text-primary)] relative overflow-x-hidden overflow-y-auto"
  >
    <!-- Dynamic Interactive Particles Canvas -->
    <canvas id="auth-particles" class="absolute inset-0 z-0 pointer-events-none"></canvas>

    <!-- Soft colored background ambient blur orbs -->
    <div class="absolute -top-40 -left-40 w-[500px] h-[500px] rounded-full bg-indigo-600/10 blur-[120px] z-0 pointer-events-none"></div>
    <div class="absolute -bottom-40 -right-40 w-[500px] h-[500px] rounded-full bg-cyan-600/10 blur-[120px] z-0 pointer-events-none"></div>

    <div class="w-full max-w-md z-10">
      <!-- Back Link -->
      <a
        href="index.html"
        class="inline-flex items-center gap-2 text-xs font-semibold text-[var(--text-secondary)] hover:text-white transition-all duration-200 mb-6 bg-[var(--bg-secondary)]/50 hover:bg-[var(--bg-secondary)] border border-[var(--border-color)] px-3.5 py-2 rounded-xl backdrop-blur-md cursor-pointer hover:border-indigo-500/40"
      >
        <i class="fas fa-arrow-left text-[10px]"></i>
        <span>Back to Home</span>
      </a>

      <!-- Glassmorphic Auth Card with neon glow pulse & slow floating animation -->
      <div
        id="auth-card"
        class="glass-panel neon-glow-card float-slow w-full rounded-3xl border border-[var(--border-color)] overflow-hidden shadow-2xl p-5 sm:p-6 flex flex-col gap-4.5"
      >
        <!-- Logo and Heading -->
        <div class="flex flex-col items-center text-center gap-2">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-indigo-500/25">
            <i class="fas fa-cubes text-white text-xl animate-pulse"></i>
          </div>
          <div>
            <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
              CodeVerse Compiler
            </h1>
            <p class="text-xs text-[var(--text-secondary)]">
              Access your cloud-based compiler workbench
            </p>
          </div>
        </div>

        <!-- Authentication Tabs with sliding Indicator -->
        <div class="relative flex border-b border-[var(--border-color)] text-sm font-semibold select-none pb-1">
          <button
            id="auth-tab-login"
            class="w-1/2 pb-2 text-center transition-all duration-300 text-white cursor-pointer focus:outline-none z-10"
          >
            Sign In
          </button>
          <button
            id="auth-tab-signup"
            class="w-1/2 pb-2 text-center transition-all duration-300 text-[var(--text-secondary)] hover:text-white cursor-pointer focus:outline-none z-10"
          >
            Create Account
          </button>
          <!-- Sliding indicator underline -->
          <div id="auth-tab-indicator" class="active-tab-indicator w-1/2" style="left: 0%;"></div>
        </div>

        <!-- Sliding Forms Layout -->
        <div class="relative overflow-hidden w-full">
          <div id="auth-slider" class="sliding-form-wrapper">
            
            <!-- Login Panel (Sign In) -->
            <div class="w-1/2 flex flex-col gap-3 pr-3 pl-1">
              <form id="login-form" class="flex flex-col gap-3">
                <!-- Email Field -->
                <div class="flex flex-col gap-1.5 glow-input-focus">
                  <label
                    for="login-email"
                    class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider"
                    >Email Address</label
                  >
                  <div class="relative flex items-center">
                    <i class="fas fa-envelope absolute left-3.5 text-xs text-[var(--text-muted)]"></i>
                    <input
                      type="email"
                      id="login-email"
                      required
                      class="w-full pl-10 pr-4 py-2 rounded-xl text-sm bg-[var(--bg-tertiary)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none transition-all duration-200"
                      placeholder="developer@domain.com"
                    />
                  </div>
                </div>

                <!-- Password Field -->
                <div class="flex flex-col gap-1.5 glow-input-focus">
                  <label
                    for="login-password"
                    class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider"
                    >Password</label
                  >
                  <div class="relative flex items-center">
                    <i class="fas fa-lock absolute left-3.5 text-xs text-[var(--text-muted)]"></i>
                    <input
                      type="password"
                      id="login-password"
                      required
                      class="w-full pl-10 pr-10 py-2 rounded-xl text-sm bg-[var(--bg-tertiary)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none transition-all duration-200"
                      placeholder="••••••••••••"
                    />
                    <button
                      type="button"
                      class="login-toggle-pass absolute right-3 p-1.5 text-[var(--text-secondary)] hover:text-white transition-colors duration-200"
                      title="Show/Hide Password"
                    >
                      <i class="fas fa-eye text-xs"></i>
                    </button>
                  </div>
                </div>

                <!-- Submit Button -->
                <button
                  type="submit"
                  class="w-full py-2 mt-2 rounded-xl text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-500 active:scale-95 shadow-md shadow-indigo-600/20 transition-all duration-200 cursor-pointer btn-premium-glow"
                >
                  Sign In to Account
                </button>
              </form>
            </div>

            <!-- Signup Panel (Create Account) -->
            <div class="w-1/2 flex flex-col gap-3 pl-3 pr-1">
              <form id="signup-form" class="flex flex-col gap-3">
                <!-- Name Field -->
                <div class="flex flex-col gap-1.5 glow-input-focus">
                  <label
                    for="signup-name"
                    class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider"
                    >Name</label
                  >
                  <div class="relative flex items-center">
                    <i class="fas fa-user absolute left-3.5 text-xs text-[var(--text-muted)]"></i>
                    <input
                      type="text"
                      id="signup-name"
                      class="w-full pl-10 pr-4 py-2 rounded-xl text-sm bg-[var(--bg-tertiary)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none transition-all duration-200"
                      placeholder="Enter your name"
                    />
                  </div>
                </div>

                <!-- Email Field -->
                <div class="flex flex-col gap-1.5 glow-input-focus">
                  <label
                    for="signup-email"
                    class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider"
                    >Email Address</label
                  >
                  <div class="relative flex items-center">
                    <i class="fas fa-envelope absolute left-3.5 text-xs text-[var(--text-muted)]"></i>
                    <input
                      type="email"
                      id="signup-email"
                      class="w-full pl-10 pr-4 py-2 rounded-xl text-sm bg-[var(--bg-tertiary)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none transition-all duration-200"
                      placeholder="developer@domain.com"
                    />
                  </div>
                </div>

                <!-- Password Field -->
                <div class="flex flex-col gap-1.5 glow-input-focus">
                  <label
                    for="signup-password"
                    class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider"
                    >Password</label
                  >
                  <div class="relative flex items-center">
                    <i class="fas fa-lock absolute left-3.5 text-xs text-[var(--text-muted)]"></i>
                    <input
                      type="password"
                      id="signup-password"
                      class="w-full pl-10 pr-10 py-2 rounded-xl text-sm bg-[var(--bg-tertiary)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none transition-all duration-200"
                      placeholder="••••••••••••"
                    />
                    <button
                      type="button"
                      class="signup-toggle-pass absolute right-3 p-1.5 text-[var(--text-secondary)] hover:text-white transition-colors duration-200"
                      title="Show/Hide Password"
                    >
                      <i class="fas fa-eye text-xs"></i>
                    </button>
                  </div>
                </div>

                <!-- Confirm Password Field -->
                <div class="flex flex-col gap-1.5 glow-input-focus">
                  <label
                    for="signup-confirm-pass"
                    class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider"
                    >Confirm Password</label
                  >
                  <div class="relative flex items-center">
                    <i class="fas fa-lock-open absolute left-3.5 text-xs text-[var(--text-muted)]"></i>
                    <input
                      type="password"
                      id="signup-confirm-pass"
                      class="w-full pl-10 pr-4 py-2.5 rounded-xl text-sm bg-[var(--bg-tertiary)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none transition-all duration-200"
                      placeholder="Re-enter password"
                    />
                  </div>
                </div>

                <!-- Submit Button -->
                <button
                  type="submit"
                  class="w-full py-2.5 mt-2 rounded-xl text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-500 active:scale-95 shadow-md shadow-indigo-600/20 transition-all duration-200 cursor-pointer btn-premium-glow"
                >
                  Create Account
                </button>
              </form>
            </div>
            
          </div>
        </div>

        <!-- Social Separator -->
        <div class="flex items-center gap-4 text-xs font-semibold text-[var(--text-muted)] mt-1 select-none">
          <div class="h-[1px] bg-[var(--border-color)] flex-grow"></div>
          <span>OR CONTINUE WITH</span>
          <div class="h-[1px] bg-[var(--border-color)] flex-grow"></div>
        </div>

        <!-- Social Buttons -->
        <div class="grid grid-cols-2 gap-3">
          <button
            id="auth-social-github"
            class="flex items-center justify-center gap-2 py-2 px-3 rounded-xl border border-[var(--border-color)] bg-[var(--bg-secondary)]/50 hover:bg-[var(--bg-secondary)] text-slate-100 hover:text-white text-xs font-semibold active:scale-95 transition-all duration-200 cursor-pointer"
          >
            <i class="fab fa-github text-sm"></i>
            <span>GitHub</span>
          </button>
          <button
            id="auth-social-google"
            class="flex items-center justify-center gap-2 py-2 px-3 rounded-xl border border-[var(--border-color)] bg-[var(--bg-secondary)]/50 hover:bg-[var(--bg-secondary)] text-slate-100 hover:text-white text-xs font-semibold active:scale-95 transition-all duration-200 cursor-pointer"
          >
            <i class="fab fa-google text-sm text-rose-500"></i>
            <span>Google</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Core Logic JavaScript -->
    <script src="js/main.js?v=14"></script>
    <script src="js/auth.js?v=14"></script>
  </body>
</html>
