<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeVerse - Account Authentication</title>

    <!-- FontAwesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Styling override sheet (Dark/Light Variables) -->
    <link rel="stylesheet" href="css/style.css?v=13" />
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-4 transition-colors duration-300 bg-[var(--bg-primary)] text-[var(--text-primary)] relative overflow-hidden"
  >
    <!-- Background Swirl Particles simulation placeholder visual -->
    <div class="absolute inset-0 z-0 bg-gradient-to-tr from-indigo-950/20 via-slate-950/30 to-cyan-950/20"></div>
    <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-indigo-600/10 blur-[100px] z-0"></div>
    <div class="absolute -bottom-40 -right-40 w-96 h-96 rounded-full bg-cyan-600/10 blur-[100px] z-0"></div>

    <div class="w-full max-w-md z-10">
      <!-- Back Link -->
      <a
        href="index.html"
        class="inline-flex items-center gap-2 text-xs font-semibold text-[var(--text-secondary)] hover:text-white transition-all duration-200 mb-6 bg-[var(--bg-secondary)]/50 hover:bg-[var(--bg-secondary)] border border-[var(--border-color)] px-3 py-1.5 rounded-xl backdrop-blur-md cursor-pointer"
      >
        <i class="fas fa-arrow-left"></i>
        <span>Back to Home</span>
      </a>

      <!-- Glassmorphic Auth Card -->
      <div
        id="auth-card"
        class="glass-panel w-full rounded-3xl border border-[var(--border-color)] overflow-hidden shadow-2xl p-6 sm:p-8 flex flex-col gap-6"
      >
        <!-- Logo and Heading -->
        <div class="flex flex-col items-center text-center gap-2">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-500 to-cyan-400 flex items-center justify-center shadow-lg shadow-indigo-500/20">
            <i class="fas fa-cubes text-white text-xl animate-pulse"></i>
          </div>
          <div>
            <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
              CodeVerse Compiler
            </h1>
            <p class="text-xs text-[var(--text-secondary)]">
              Welcome! Access your developer workbench
            </p>
          </div>
        </div>

        <!-- Authentication Tabs -->
        <div class="grid grid-cols-2 border-b border-[var(--border-color)] text-sm font-semibold select-none">
          <button
            id="auth-tab-login"
            class="pb-3 border-b-2 text-center transition-all duration-200 border-indigo-500 text-white cursor-pointer"
          >
            Sign In
          </button>
          <button
            id="auth-tab-signup"
            class="pb-3 border-b-2 text-center transition-all duration-200 border-transparent text-[var(--text-secondary)] hover:text-white cursor-pointer"
          >
            Create Account
          </button>
        </div>

        <!-- Form Elements -->
        <form id="auth-form" class="flex flex-col gap-4">
          <!-- Name Field (Hidden by default, shown in Sign Up) -->
          <div id="auth-field-name" class="flex-col gap-1.5 hidden">
            <label
              for="auth-input-name"
              class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider"
              >Name</label
            >
            <div class="relative flex items-center">
              <i class="fas fa-user absolute left-3.5 text-xs text-[var(--text-muted)]"></i>
              <input
                type="text"
                id="auth-input-name"
                class="w-full pl-10 pr-4 py-2.5 rounded-xl text-sm bg-[var(--bg-tertiary)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all duration-200"
                placeholder="Enter your name"
              />
            </div>
          </div>

          <!-- Email Field -->
          <div class="flex flex-col gap-1.5">
            <label
              for="auth-input-email"
              class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider"
              >Email Address</label
            >
            <div class="relative flex items-center">
              <i class="fas fa-envelope absolute left-3.5 text-xs text-[var(--text-muted)]"></i>
              <input
                type="email"
                id="auth-input-email"
                required
                class="w-full pl-10 pr-4 py-2.5 rounded-xl text-sm bg-[var(--bg-tertiary)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all duration-200"
                placeholder="developer@domain.com"
              />
            </div>
          </div>

          <!-- Password Field -->
          <div class="flex flex-col gap-1.5">
            <div class="flex justify-between items-center">
              <label
                for="auth-input-password"
                class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider"
                >Password</label
              >
            </div>
            <div class="relative flex items-center">
              <i class="fas fa-lock absolute left-3.5 text-xs text-[var(--text-muted)]"></i>
              <input
                type="password"
                id="auth-input-password"
                required
                class="w-full pl-10 pr-10 py-2.5 rounded-xl text-sm bg-[var(--bg-tertiary)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all duration-200"
                placeholder="••••••••••••"
              />
              <button
                type="button"
                id="auth-toggle-pass"
                class="absolute right-3 p-1.5 text-[var(--text-secondary)] hover:text-white transition-colors duration-200"
                title="Show/Hide Password"
              >
                <i class="fas fa-eye text-xs"></i>
              </button>
            </div>
          </div>

          <!-- Confirm Password Field (Hidden by default, shown in Sign Up) -->
          <div id="auth-field-confirm-pass" class="flex-col gap-1.5 hidden">
            <label
              for="auth-input-confirm-pass"
              class="block text-[10px] font-bold text-[var(--text-secondary)] uppercase tracking-wider"
              >Confirm Password</label
            >
            <div class="relative flex items-center">
              <i class="fas fa-lock-open absolute left-3.5 text-xs text-[var(--text-muted)]"></i>
              <input
                type="password"
                id="auth-input-confirm-pass"
                class="w-full pl-10 pr-4 py-2.5 rounded-xl text-sm bg-[var(--bg-tertiary)] border border-[var(--border-color)] text-[var(--text-primary)] focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all duration-200"
                placeholder="Re-enter password"
              />
            </div>
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            id="auth-submit-btn"
            class="w-full py-2.5 mt-2 rounded-xl text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-500 active:scale-95 shadow-md shadow-indigo-600/20 transition-all duration-200 cursor-pointer"
          >
            Sign In to Account
          </button>
        </form>

        <!-- Social Separator -->
        <div class="flex items-center gap-4 text-xs font-semibold text-[var(--text-muted)] mt-2 select-none">
          <div class="h-[1px] bg-[var(--border-color)] flex-grow"></div>
          <span>OR CONTINUE WITH</span>
          <div class="h-[1px] bg-[var(--border-color)] flex-grow"></div>
        </div>

        <!-- Social Buttons -->
        <div class="grid grid-cols-2 gap-3">
          <button
            id="auth-social-github"
            class="flex items-center justify-center gap-2 py-2 px-3 rounded-xl border border-[var(--border-color)] bg-[var(--bg-secondary)]/50 hover:bg-[var(--bg-secondary)] text-slate-100 hover:text-white text-xs font-semibold active:scale-95 transition-all duration-200 cursor-pointer"
          >
            <i class="fab fa-github text-sm"></i>
            <span>GitHub</span>
          </button>
          <button
            id="auth-social-google"
            class="flex items-center justify-center gap-2 py-2 px-3 rounded-xl border border-[var(--border-color)] bg-[var(--bg-secondary)]/50 hover:bg-[var(--bg-secondary)] text-slate-100 hover:text-white text-xs font-semibold active:scale-95 transition-all duration-200 cursor-pointer"
          >
            <i class="fab fa-google text-sm text-rose-500"></i>
            <span>Google</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Core Logic JavaScript -->
    <script src="js/main.js?v=32"></script>
    <script src="js/auth.js?v=32"></script>
  </body>
</html>
